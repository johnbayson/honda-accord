<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ESM - Honda Service Manual</title>
<style>body{margin:0;font-family:Arial,sans-serif}#bar{background:#646464;color:#fff;padding:8px 16px;display:flex;align-items:center;justify-content:space-between}#bar button{background:#888;color:#fff;border:none;padding:4px 12px;cursor:pointer;border-radius:3px}#bar button:hover{background:#aaa}iframe{width:100%;height:calc(100vh - 40px);border:none}</style>
<script>
function init(){
  var p={};var t=location.href.split("?");
  if(t.length>1){t[1].split("&").forEach(function(s){var k=s.split("=");p[k[0]]=(k.length>1)?decodeURIComponent(k[1]):""})}
  var base=t[0].substring(0,t[0].lastIndexOf("/")+1);
  document.getElementById("content").src=base+(p["url"]||"ESMBLANK.HTML");
}
function Cts(k,a){var u=k+'.html';if(a)u+='#'+a;document.getElementById("content").src=u}
function Old(){}
function Jmp(a){try{document.getElementById("content").contentWindow.location.hash=a}catch(e){}}
function Prt(){try{document.getElementById("content").contentWindow.print()}catch(e){window.print()}}
</script>
</head>
<body onload="init()">
<div id="bar"><span>Honda ESM Viewer</span><button onclick="Prt()">Print</button></div>
<iframe id="content" name="BASE" src="about:blank"></iframe>
</body>
</html>
