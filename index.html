function applyDarkMode(){
  var cls=document.body.className;if(cls!=='modern'&&cls!=='mint'&&cls!=='wildfire'&&cls!=='aurora')return;
  try{
    var fr=document.getElementById('contentFrame');
    var doc=fr.contentDocument||fr.contentWindow.document;
    if(!doc||!doc.head)return;
    var src=fr.src||fr.contentWindow.location.href;
    if(src.indexOf('welcome.html')!==-1||src.indexOf('service.html')!==-1||src.indexOf('trims.html')!==-1)return;
    var existing=doc.getElementById('esm-dark');
    if(existing)existing.remove();
    var s=doc.createElement('style');s.id='esm-dark';s.textContent=DARK_CSS;
    doc.head.appendChild(s);
  }catch(e){}
}
function removeDarkMode(){
  try{
    var fr=document.getElementById('contentFrame');
    var doc=fr.contentDocument||fr.contentWindow.document;
    var s=doc.getElementById('esm-dark');if(s)s.remove();
  }catch(e){}
}

var MODES=['modern','classic','sakura','mint','wildfire','aurora'];
var MODE_NAMES={modern:'MODERN',classic:'CLASSIC',sakura:'SAKURA',mint:'MINT',wildfire:'WILDFIRE',aurora:'AURORA'};
function cycleMode(){
  var cur=document.body.className,idx=MODES.indexOf(cur);
  var next=MODES[(idx+1)%MODES.length];
  setMode(next);
}
function setMode(m){
  document.body.className=m;
  document.getElementById('modeName').textContent=MODE_NAMES[m]||m.toUpperCase();
  if(m==='modern'||m==='mint'||m==='wildfire'||m==='aurora')applyDarkMode();else removeDarkMode();
  try{localStorage.setItem('esm_mode',m)}catch(e){}
}

/* ════════════════════════════════════════════
   NAVIGATION HISTORY (Back/Forward)
   ════════════════════════════════════════════ */
function navPush(pg){
  if(navLock)return;
  if(navIdx>=0&&navHist[navIdx]&&navHist[navIdx].url===pg.url)return;
  navIdx++;navHist.length=navIdx;navHist.push(pg);
  if(navHist.length>100)navHist.shift(),navIdx--;
}
function navBack(){
  if(navIdx<=0)return;navLock=true;navIdx--;
  var pg=navHist[navIdx];loadPage(pg);navLock=false;
}
function navFwd(){
  if(navIdx>=navHist.length-1)return;navLock=true;navIdx++;
  var pg=navHist[navIdx];loadPage(pg);navLock=false;
}
function loadPage(pg){
  document.getElementById('contentFrame').src=pg.url;
  document.getElementById('cTitle').textContent=pg.title||pg.page;
  curPage=pg;updateBkBtn();setHash();
}

   ════════════════════════════════════════════ */
function getBookmarks(){try{return JSON.parse(localStorage.getItem('esm_bk')||'[]')}catch(e){return[]}}
function saveBookmarks(bk){try{localStorage.setItem('esm_bk',JSON.stringify(bk))}catch(e){}}
function isBookmarked(url){return getBookmarks().some(function(b){return b.url===url})}
function togBookmark(){
  if(!curPage||!curPage.url)return;
  var bk=getBookmarks();
  var idx=-1;for(var i=0;i<bk.length;i++){if(bk[i].url===curPage.url){idx=i;break}}
  if(idx>=0)bk.splice(idx,1);else bk.unshift({url:curPage.url,title:curPage.title||curPage.page,gen:curPage.gen});
  if(bk.length>50)bk.length=50;
  saveBookmarks(bk);updateBkBtn();renderBookmarks();
}
function removeBookmark(i){var bk=getBookmarks();bk.splice(i,1);saveBookmarks(bk);updateBkBtn();renderBookmarks()}
function updateBkBtn(){
  var btn=document.getElementById('btnBk');if(!curPage||!curPage.url){btn.innerHTML='&#9734;';btn.className='cb-btn';return}
  if(isBookmarked(curPage.url)){btn.innerHTML='&#9733;';btn.className='cb-btn bk-active'}else{btn.innerHTML='&#9734;';btn.className='cb-btn'}
}
function renderBookmarks(){
  var bk=getBookmarks(),h='';
  if(bk.length===0)h='<div class="no-res" style="padding:8px">No bookmarks yet</div>';
  else for(var i=0;i<bk.length;i++)h+='<div class="bk-item"><a onclick="openBk('+i+')">'+escH(bk[i].title)+'</a><span class="bk-rm" onclick="removeBookmark('+i+')" title="Remove">&times;</span></div>';
  document.getElementById('bkList').innerHTML=h;
}
function openBk(i){var bk=getBookmarks();if(bk[i]){var pg={gen:bk[i].gen,page:'',title:bk[i].title,url:bk[i].url};navPush(pg);loadPage(pg);addRecent(pg)}}

   ════════════════════════════════════════════ */
function getRecent(){try{return JSON.parse(localStorage.getItem('esm_rc')||'[]')}catch(e){return[]}}
function saveRecent(rc){try{localStorage.setItem('esm_rc',JSON.stringify(rc))}catch(e){}}
function addRecent(pg){
  if(!pg||!pg.url)return;var rc=getRecent();
  rc=rc.filter(function(r){return r.url!==pg.url});
  rc.unshift({url:pg.url,title:pg.title||pg.page,gen:pg.gen});
  if(rc.length>20)rc.length=20;
  saveRecent(rc);renderRecent();
}
function renderRecent(){
  var rc=getRecent(),h='';
  if(rc.length===0)h='<div class="no-res" style="padding:8px">No history yet</div>';
  else for(var i=0;i<rc.length;i++)h+='<span class="hist-item" onclick="openRc('+i+')">'+escH(rc[i].title)+'</span>';
  document.getElementById('rcList').innerHTML=h;
}
function openRc(i){var rc=getRecent();if(rc[i]){var pg={gen:rc[i].gen,page:'',title:rc[i].title,url:rc[i].url};navPush(pg);loadPage(pg)}}

  var h="",stk=[],b=bp();for(var i=0;i<td.length;i++){var it=td[i],lv=it.Level,hc=(i+1<td.length&&td[i+1].Level>lv);

  while(stk.length>0){h+="</div></div>";stk.pop()}document.getElementById("treeContent").innerHTML=h}
function togTN(img,i){var c=document.getElementById("tc_"+i);if(!c)return;var b=bp();if(c.style.display==="block"){c.style.display="none";img.src=b+"/img/TR_PLUS.PNG"}else{c.style.display="block";img.src=b+"/img/TR_MINUS.PNG"}}

  var fs=document.querySelectorAll('.tf[data-i="'+i+'"]');if(fs.length>0)fs[0].src=bp()+"/img/TR_OPEN.PNG";
  var it=curTD[i];if(it){curKey=it.Supp||"";curSct=it.Sct||"";curSc=it.Sc||"";curSys=it.Sys||"";curComp=it.Comp||"";curSitq=it.Sitq||"";doSearch()}}

  document.getElementById("searchResults").innerHTML='<div class="no-res">Searching\u2026</div>';window.tDT=[];removeScript(_listScript);

  else h='<div class="res-hdr">'+n+' result'+(n!==1?'s':'')+(dtcOnly?' (DTC)':'')+'</div>'+h;

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){var kw=document.getElementById('txtKW');if(document.activeElement===kw){clearSearch();kw.blur();return}}
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='/'&&!e.ctrlKey){e.preventDefault();document.getElementById('txtKW').focus()}

  if(e.ctrlKey&&e.key==='b'){e.preventDefault();togBookmark()}
});

/* ════════════════════════════════════════════
   GLOSSARY
   ════════════════════════════════════════════ */
var GLOSSARY=[
["A/F","Air/Fuel ratio sensor. Measures oxygen content in exhaust gases to help the ECM adjust the fuel mixture."],
["A/T","Automatic Transaxle (automatic gearbox). Honda's term for their automatic transmission units."],
["ABS","Anti-lock Braking System. Prevents wheels from locking up under heavy braking."],
["ACC","Adaptive Cruise Control. Radar-based cruise control that adjusts speed to maintain distance from the car ahead. MK8 only."],
["B-CAN","Body Controller Area Network. The communication bus linking body electronics (windows, locks, lights)."],
["CMBS","Collision Mitigation Braking System. Pre-crash system that tightens seatbelts and applies brakes. MK8 only."],
["CMP","Camshaft Position sensor. Tells the ECM where the camshaft is in its rotation cycle."],
["CKP","Crankshaft Position sensor. Tells the ECM where the crankshaft is and calculates engine RPM."],
["DLC","Data Link Connector. The 16-pin OBD-II diagnostic port, usually under the dashboard on the driver's side."],
["DTC","Diagnostic Trouble Code. An error code stored by a control unit when it detects a fault. P-codes are powertrain, B-codes are body, U-codes are network, C-codes are chassis."],
["ECM","Engine Control Module. The main engine computer. Controls fuel injection, ignition timing, and emissions."],
["ECT","Engine Coolant Temperature sensor. Measures coolant temperature for the ECM."],
["EGR","Exhaust Gas Recirculation. Reduces NOx emissions by recirculating a portion of exhaust gas back into the intake."],
["ELD","Electrical Load Detector. Monitors the electrical load on the charging system so the ECM can adjust idle speed."],
["EPS","Electric Power Steering. Honda's electrically-assisted steering system — no hydraulic fluid involved."],
["EVAP","Evaporative Emission Control System. Captures fuel vapour from the tank and routes it to the engine to be burned rather than released."],
["F-CAN","Fast Controller Area Network. The high-speed communication bus linking drivetrain modules (ECM, PCM, ABS, etc)."],
["HDS","Honda Diagnostic System. Honda's official dealership scan tool. Connects via the DLC port."],
["HIM","Honda Interface Module. Hardware interface that connects the HDS laptop to the car's diagnostic port."],
["HVAC","Heating, Ventilation, and Air Conditioning."],
["IAT","Intake Air Temperature sensor. Measures the temperature of air entering the engine."],
["IMRC","Intake Manifold Runner Control. Valve system that changes the effective length of the intake runners for better performance across the rev range."],
["LKAS","Lane Keeping Assist System. Camera-based system that applies steering torque to keep the car in its lane. MK8 only."],
["M/T","Manual Transaxle (manual gearbox)."],
["MAP","Manifold Absolute Pressure sensor. Measures intake vacuum/pressure to help calculate air entering the engine."],
["MAF","Mass Air Flow sensor. Directly measures the volume and density of air entering the engine."],
["MIL","Malfunction Indicator Lamp. The engine warning light on the dashboard (also called the check engine light)."],
["MICU","Multiplex Integrated Control Unit. The body electronics module that controls interior lights, wipers, door locks, power windows, and other convenience features."],
["OBD-II","On-Board Diagnostics, second generation. The standardised diagnostic system. The DLC port and P/B/U/C code format are part of this standard."],
["PCS","Pressure Control Solenoid. Controls hydraulic pressure in the automatic gearbox."],
["PCM","Powertrain Control Module. Manages automatic transmission shift logic. Works alongside the ECM."],
["PCV","Positive Crankcase Ventilation. Routes blow-by gases from the crankcase back into the intake to be burned."],
["SRS","Supplemental Restraint System. The airbag system — includes airbags, seatbelt pretensioners, crash sensors, and the SRS control unit."],
["SST","Special Service Tool. Honda-specific tools required for certain procedures, identified by part numbers (e.g. 07AAE-RWCA120)."],
["TDC","Top Dead Centre. The point where the piston is at the very top of its stroke. Critical for timing chain/belt alignment."],
["TPS","Throttle Position Sensor. Measures how far the throttle plate is open."],
["TWC","Three-Way Catalytic converter. Reduces three pollutants: CO, hydrocarbons, and NOx."],
["VIN","Vehicle Identification Number. The 17-character serial number unique to your car."],
["VSA","Vehicle Stability Assist. Honda's electronic stability control system. Combines ABS with traction control and stability control."],
["VTEC","Variable Valve Timing and Lift Electronic Control. Honda's system for changing valve timing and lift to optimise power and efficiency across the rev range."],
["VTC","Variable Timing Control. The actuator that adjusts camshaft timing. Part of the i-VTEC system."],
["i-CDTi","Intelligent Common-rail Direct Turbo Diesel injection. Honda's name for the 2.2L diesel engine in MK7 models (N22A)."],
["i-DTEC","Intelligent Diesel Technology Engine Clean. Honda's name for the 2.2L diesel in MK8 models (N22B). Updated version of i-CDTi."],
["i-VTEC","Intelligent VTEC. Combines VTEC (variable valve lift) with VTC (variable valve timing) for both performance and economy."]
];
function renderGlossary(){
  var h='';for(var i=0;i<GLOSSARY.length;i++){
    h+='<div class="gl-entry"><div class="gl-term">'+escH(GLOSSARY[i][0])+'</div><div class="gl-def">'+escH(GLOSSARY[i][1])+'</div></div>';
  }document.getElementById('glList').innerHTML=h;
}

      h+='<div class="wire-row"><div class="wire-swatch" style="background:'+w[2]+'"></div><span class="wire-abbr">'+w[0]+'</span><span class="wire-name">'+w[1]+'</span></div>';
    }
    h+='<div class="wire-note"><strong>Striped wires:</strong> shown as two colours separated by a slash, e.g. YEL/GRN = yellow wire with green stripe. The first colour is the base, the second is the stripe.</div>';
    p.innerHTML=h;p.style.display='block';
  }else{p.style.display='none'}
}

/* ════════════════════════════════════════════
/* ════════════════════════════════════════════
   URL HASH ROUTING
   ════════════════════════════════════════════ */
function encodeHash(gen,mc,my,page,title){
  return '#'+gen+'/'+mc+'/'+my+'/'+page+'/'+(title?encodeURIComponent(title):'');
}
function setHash(){
  if(!curPage||!curPage.url)return;
  try{
    var h=encodeHash(getGen(),getMC(),getMY(),curPage.page,curPage.title);
    if(location.hash!==h)history.replaceState(null,'',h);
  }catch(e){}
}
function loadFromHash(){
  var h=location.hash;if(!h||h.length<4)return false;
  var parts=h.substring(1).split('/');if(parts.length<4)return false;
  var gen=parts[0],mc=parts[1],my=parts[2],page=parts[3],title=parts[4]?decodeURIComponent(parts[4]):page;
  // Find and select the right year
  var myIdx=-1;for(var i=0;i<ALL_MODELS.length;i++){if(ALL_MODELS[i].year===my&&ALL_MODELS[i].gen===gen){myIdx=i;break}}
  if(myIdx<0)return false;
  document.getElementById('cmbMY').selectedIndex=myIdx;popMC();
  // Find and select the right model code
  var m=ALL_MODELS[myIdx],mcIdx=-1;for(var i=0;i<m.codes.length;i++){if(m.codes[i]===mc){mcIdx=i;break}}
  if(mcIdx<0)return false;
  document.getElementById('cmbMC').selectedIndex=mcIdx;
  // Load generation + tree
  var genChanged=(gen!==curGen);curGen=gen;
  if(genChanged){removeScript(_sieScript);_sieScript=injectScript('./'+gen+'/en/js/SieListFunc.js',function(){loadTree()})}else{loadTree()}
  // Open the page
  var u='./'+gen+'/en/html/'+page+'.html?000?'+mc+','+my;
  var pg={gen:gen,page:page,title:title,url:u};
  navPush(pg);curPage=pg;
  document.getElementById('contentFrame').src=u;
  document.getElementById('cTitle').textContent=title;
  updateBkBtn();addRecent(pg);
  return true;
}
window.addEventListener('hashchange',function(){loadFromHash()});

/* ════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════ */
window.onload=function(){
  loadMode();initDropdowns();renderBookmarks();renderRecent();renderGlossary();
  document.getElementById('contentFrame').addEventListener('load',onFrameLoad);
  // Restore sidebar state
  try{if(localStorage.getItem('esm_sb')==='1')document.getElementById('sidebar').classList.add('collapsed')}catch(e){}
  // Load from URL hash if present
  loadFromHash();
};
</script>
